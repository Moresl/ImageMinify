name: Bug 反馈
description: 报告一个 Bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告 Bug！请尽量详细地描述问题，以便我们快速定位和修复。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清楚地描述您遇到的问题
      placeholder: 简要描述 Bug 的表现
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供复现该问题的步骤
      placeholder: |
        1. 打开应用
        2. 点击「选择文件」
        3. 选择一张 PNG 图片
        4. 点击「开始压缩」
        5. 出现错误...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 您期望应该发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果可以，请提供相关截图

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - 其他
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 您使用的 ImageMinify 版本号
      placeholder: "v2.1.0"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他可能有助于定位问题的信息
